</g>
<!-- interface trim -->
<path d="M25 52h245l34-27h366" fill="none" stroke="#ff6b2c" stroke-width="7"/><path d="M25 78h130" stroke="#42e8dc" stroke-width="4"/><text x="38" y="126" fill="#d9eee9" font-family="Arial Black" font-size="25" letter-spacing="5">RANGER ONE // BH-01</text><text x="38" y="160" fill="#ff9c64" font-family="Arial Black" font-size="16" letter-spacing="4">SPECIAL OPERATIONS · EXTRACTION</text>
</svg>

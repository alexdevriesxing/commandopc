 <path d="M216 520l78 42 51-27 77 27 61 300H176z" fill="#263b3c" stroke-width="17"/><path d="M274 527l-34 335M416 532l31 330" fill="none" stroke="#7d9384" stroke-width="15"/><path d="M240 598h203v122H240z" fill="#18282d" stroke-width="12"/><path d="M257 621h47v72h-47zM320 621h47v72h-47zM383 621h43v72h-43z" fill="#455b52" stroke-width="8"/>
 <path d="M264 744h177v72H264z" fill="#17262b" stroke-width="11"/><text x="352" y="792" text-anchor="middle" fill="#f5e8ca" stroke="#061018" stroke-width="4" paint-order="stroke" font-family="Arial Black" font-size="30" letter-spacing="4">BH-01</text>

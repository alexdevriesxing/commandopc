<svg xmlns="http://www.w3.org/2000/svg" width="700" height="900" viewBox="0 0 700 900" role="img" aria-labelledby="t d">
<title id="t">Ranger One portrait</title><desc id="d">A detailed modern comic portrait of the Black Horizon field operator.</desc>
<defs>
 <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071018"/><stop offset=".55" stop-color="#18303a"/><stop offset="1" stop-color="#7c3d32"/></linearGradient>
 <linearGradient id="skin" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f1c095"/><stop offset=".52" stop-color="#c88361"/><stop offset="1" stop-color="#7e453c"/></linearGradient>
 <linearGradient id="gear" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#61786a"/><stop offset=".5" stop-color="#344a43"/><stop offset="1" stop-color="#15282c"/></linearGradient>
 <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#8aa0a7"/><stop offset=".45" stop-color="#35464f"/><stop offset="1" stop-color="#111b22"/></linearGradient>
 <radialGradient id="sun"><stop stop-color="#fff4b0"/><stop offset=".22" stop-color="#ffad45" stop-opacity=".95"/><stop offset=".62" stop-color="#ff5b2f" stop-opacity=".45"/><stop offset="1" stop-color="#ff5b2f" stop-opacity="0"/></radialGradient>
 <pattern id="dots" width="12" height="12" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.5" fill="#02070b" opacity=".22"/></pattern>
 <filter id="shadow" x="-40%" y="-40%" width="180%" height="190%"><feDropShadow dx="8" dy="12" stdDeviation="6" flood-color="#000" flood-opacity=".72"/></filter>
 <filter id="glow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="700" height="900" fill="url(#bg)"/><rect width="700" height="900" fill="url(#dots)" opacity=".38"/><circle cx="570" cy="145" r="210" fill="url(#sun)"/>
<!-- industrial skyline -->
<g fill="#101c23" stroke="#061018" stroke-width="8" opacity=".86"><path d="M0 600V430h88v-85h48v85h72v170z"/><path d="M510 570V350h70v-105h38v105h82v220z"/><path d="M430 600V445h92v155z"/><path d="M40 345V250h17v95M556 245V145h18v100M612 350V205h16v145" fill="none"/></g>
<g stroke="#ff6b2c" stroke-width="5" opacity=".55"><path d="M15 478h176M454 492h234M508 410h161"/></g>

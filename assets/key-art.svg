 <pattern id="dots" width="12" height="12" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.5" fill="#061018" opacity=".2"/></pattern>
 <filter id="shadow" x="-50%" y="-50%" width="220%" height="220%"><feDropShadow dx="9" dy="14" stdDeviation="5" flood-color="#000" flood-opacity=".78"/></filter>
 <filter id="glow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>

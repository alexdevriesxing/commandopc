<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="t d">
<title id="t">Black Horizon Cinder Protocol key art</title><desc id="d">A comic-styled special operations officer races through a desert battle carrying a glowing isotope case.</desc>
<defs>
 <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#081722"/><stop offset=".42" stop-color="#714139"/><stop offset="1" stop-color="#e2914b"/></linearGradient>
 <linearGradient id="sand" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#7a4035"/><stop offset=".45" stop-color="#c26d3d"/><stop offset="1" stop-color="#e6b264"/></linearGradient>
 <linearGradient id="skin" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#efbc8e"/><stop offset=".55" stop-color="#bd7658"/><stop offset="1" stop-color="#753c35"/></linearGradient>
 <linearGradient id="gear" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#667b69"/><stop offset=".55" stop-color="#344a43"/><stop offset="1" stop-color="#17272c"/></linearGradient>
 <linearGradient id="case" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#23383d"/><stop offset=".58" stop-color="#111c23"/><stop offset="1" stop-color="#071018"/></linearGradient>
 <radialGradient id="sun"><stop stop-color="#fffbd0"/><stop offset=".22" stop-color="#ffcc60"/><stop offset=".58" stop-color="#ff6b2c" stop-opacity=".62"/><stop offset="1" stop-color="#ff6b2c" stop-opacity="0"/></radialGradient>
